<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC Stoop — Explore (redesign preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&display=swap" rel="stylesheet">
<style>
  :root{
    --serif:'Newsreader',Georgia,serif; --ink:#211B14; --ink-2:#5A5247; --ink-3:#6E655A;
    --canvas:#F3EBDC; --card:#FBF6EC; --accent:#BE4D2B; --clay:#A8826B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#E6DAC6;font-family:'Hanken Grotesk',system-ui,sans-serif;display:flex;justify-content:center;padding:30px 0;color:var(--ink);-webkit-font-smoothing:antialiased}
  .phone{width:402px;height:860px;background:var(--canvas);border-radius:44px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.28);border:10px solid #1a1612}
  .scroll{flex:1;overflow-y:auto}
  .scroll::-webkit-scrollbar{display:none}
  h2{font-family:var(--serif);font-weight:500;font-size:25px;letter-spacing:.01em;margin:0}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--clay);font-weight:600}
  .row{display:flex;gap:13px;overflow-x:auto;padding:16px 20px 4px}
  .row::-webkit-scrollbar{display:none}
</style></head>
<body>
<div class="phone">
  <!-- HEADER -->
  <div style="padding:46px 20px 10px;display:flex;align-items:center;justify-content:space-between">
    <div style="width:40px;height:40px;border-radius:999px;background:var(--card);border:1px solid rgba(33,27,20,.10);display:flex;align-items:center;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="3.2" cy="3.2" r="1.7" fill="#5A5247"/><circle cx="12.8" cy="3.2" r="1.7" fill="#5A5247"/><circle cx="3.2" cy="12.8" r="1.7" fill="#5A5247"/><circle cx="12.8" cy="12.8" r="1.7" fill="#5A5247"/></svg>
    </div>
    <div style="text-align:center;line-height:1">
      <div style="font-size:9px;letter-spacing:.28em;color:var(--clay);font-weight:600;text-transform:uppercase;margin-bottom:3px">The City Guide</div>
      <div style="font-family:var(--serif);font-size:25px;font-weight:500;letter-spacing:.01em">NYC <span style="font-style:italic;color:var(--accent)">Stoop</span></div>
    </div>
    <div style="width:40px;height:40px;border-radius:999px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(190,77,43,.35)">
      <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="6" r="3.2" fill="#fff"/><path d="M3 16c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5" fill="#fff"/></svg>
    </div>
  </div>
  <!-- SEARCH -->
  <div style="padding:6px 20px 12px">
    <div style="display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid rgba(33,27,20,.12);border-radius:14px;padding:13px 16px">
      <svg width="17" height="17" viewBox="0 0 17 17"><circle cx="7" cy="7" r="5.3" stroke="#9A8E7E" stroke-width="1.6" fill="none"/><path d="M11 11l4 4" stroke="#9A8E7E" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span style="color:#9A8E7E;font-size:15.5px">Search venues, sights, artists…</span>
    </div>
  </div>

  <div class="scroll">
    <!-- PLAN MY NIGHT -->
    <div style="padding:16px 20px 4px">
      <div style="position:relative;overflow:hidden;border-radius:18px;background:linear-gradient(135deg,#C4542F,#A93C1E);padding:20px;box-shadow:0 10px 26px rgba(169,60,30,.30)">
        <div style="position:absolute;right:-28px;top:-28px;width:130px;height:130px;border-radius:999px;background:rgba(255,255,255,.07)"></div>
        <div style="position:relative;display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:9.5px;letter-spacing:.26em;color:rgba(255,255,255,.72);font-weight:600;text-transform:uppercase;margin-bottom:6px">Tonight, curated</div>
            <div style="font-family:var(--serif);font-size:27px;font-weight:500;color:#fff;line-height:1.05">Plan my night</div>
            <div style="font-size:13.5px;color:rgba(255,255,255,.82);margin-top:6px;max-width:220px;line-height:1.35">A routed plan with food, in a couple of taps.</div>
          </div>
          <div style="flex-shrink:0;width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 9h11M10 4.5L14.5 9 10 13.5" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- THIS WEEK -->
    <div style="padding:26px 0 0">
      <div style="padding:0 20px"><h2>This week in NYC</h2></div>
      <div class="eyebrow" style="padding:6px 20px 0">Live from NYC Open Data · updates daily</div>
      <div class="row" id="events"></div>
    </div>

    <!-- WHAT KIND OF DAY -->
    <div style="padding:24px 0 0">
      <div style="display:flex;align-items:baseline;justify-content:space-between;padding:0 20px">
        <h2>What kind of day?</h2><span class="eyebrow" style="letter-spacing:.14em">5 moods</span>
      </div>
      <div class="row" id="moods"></div>
    </div>

    <!-- BROWSE BY -->
    <div style="padding:26px 20px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h2>Browse by</h2>
        <div style="display:flex;background:#EBE0CD;border:1px solid rgba(33,27,20,.10);border-radius:999px;padding:3px">
          <button style="border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:6px 15px;border-radius:999px;background:#211B14;color:#F3EBDC">Topics</button>
          <button style="border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:6px 15px;border-radius:999px;background:transparent;color:#7A7062">Areas</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="browse"></div>
    </div>
    <div style="height:26px"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div style="display:flex;padding:11px 0 26px;background:rgba(243,235,220,.92);border-top:1px solid rgba(33,27,20,.10)">
    <div style="flex:1;text-align:center;color:var(--accent);font-size:11px;font-weight:700">◆<br>Explore</div>
    <div style="flex:1;text-align:center;color:#9A8E7E;font-size:11px;font-weight:500">☾<br>Tonight</div>
    <div style="flex:1;text-align:center;color:#9A8E7E;font-size:11px;font-weight:500">◉<br>Map</div>
    <div style="flex:1;text-align:center;color:#9A8E7E;font-size:11px;font-weight:500">▦<br>My Trip</div>
  </div>
</div>
<script>
  const FIELD=['#B7472A','#C6892F','#6B4453','#6F7A45','#475A66'];
  const events=[
    {f:'#B7472A',k:'Event',i:'P',t:'HOLD: Pride Block',w:'Today',l:'Washington Sq Park · Manhattan'},
    {f:'#6F7A45',k:'Market',i:'G',t:'Greenmarket',w:'Today',l:'Bowling Green · Manhattan'},
    {f:'#475A66',k:'Music',i:'T',t:'Twilight Jazz',w:'Today',l:'Pier 16 · Manhattan'},
  ];
  document.getElementById('events').innerHTML=events.map(e=>`
    <div style="flex:0 0 252px;background:var(--card);border:1px solid rgba(33,27,20,.10);border-radius:16px;overflow:hidden;box-shadow:0 6px 18px rgba(33,27,20,.05)">
      <div style="height:134px;position:relative;background:${e.f}">
        <div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.16),rgba(0,0,0,.18))"></div>
        <div style="position:absolute;top:12px;left:14px;font-family:var(--serif);font-style:italic;font-size:40px;color:rgba(255,255,255,.30);line-height:1">${e.i}</div>
        <div style="position:absolute;top:13px;right:14px;font-size:9.5px;letter-spacing:.2em;font-weight:700;color:#fff;text-transform:uppercase;background:rgba(0,0,0,.22);padding:4px 8px;border-radius:999px">${e.k}</div>
      </div>
      <div style="padding:14px 16px 16px">
        <div style="font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.15">${e.t}</div>
        <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--accent);margin-top:8px">${e.w}</div>
        <div style="font-size:13.5px;color:var(--ink-3);margin-top:4px">${e.l}</div>
      </div>
    </div>`).join('');
  const moods=[['Where to eat','Restaurants & bars'],['Just chilling','12 picks · 3 groups'],['Date night','16 picks · 4 groups'],['Family day','17 picks · 5 groups'],['Big night out','21 picks · 6 groups']];
  document.getElementById('moods').innerHTML=moods.map((m,i)=>`
    <div style="flex:0 0 158px;border-radius:16px;overflow:hidden;border:1px solid rgba(33,27,20,.10);box-shadow:0 6px 18px rgba(33,27,20,.05);background:var(--card)">
      <div style="height:150px;position:relative;background:${FIELD[i%5]}">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(0,0,0,.22))"></div>
        <div style="position:absolute;top:12px;left:14px;font-size:11px;letter-spacing:.1em;font-weight:700;color:rgba(255,255,255,.78)">${String(i+1).padStart(2,'0')}</div>
        <div style="position:absolute;left:14px;right:14px;bottom:12px;font-family:var(--serif);font-size:21px;font-weight:600;color:#fff;line-height:1.08">${m[0]}</div>
      </div>
      <div style="padding:11px 14px 13px;font-size:12.5px;color:var(--ink-3)">${m[1]}</div>
    </div>`).join('');
  const topics=['Visual Art','Jazz','Classical','Sports','Architecture','Theater','History','Hip-Hop'];
  document.getElementById('browse').innerHTML=topics.map(b=>`
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid rgba(33,27,20,.10);border-radius:12px;padding:14px 15px">
      <span style="font-size:15px;font-weight:500;color:var(--ink)">${b}</span>
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M3.5 9.5L9.5 3.5M5 3.5h4.5V8" stroke="#BE4D2B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </div>`).join('');
</script>
</body></html>
